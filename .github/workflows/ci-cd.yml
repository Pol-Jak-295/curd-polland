name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Dependencies
        run: go mod tidy

      - name: Build Linux binaries
        run: |
          ./Build/buildlinux
          mkdir -p release/linux
          mv curd-linux-x86_64 release/linux/
          mv curd-linux-arm64 release/linux/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curd-binaries
          path: |
            release/linux/curd-linux-x86_64
            release/linux/curd-linux-arm64
          retention-days: 1
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push' && 
      contains(github.event.head_commit.message, 'release:')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: curd-binaries
          path: release/linux

      - name: Get Version
        run: |
          version=$(cat VERSION.txt)
          echo "CURD_VERSION=$version" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.CURD_VERSION }}"
          name: "Curd v${{ env.CURD_VERSION }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/linux/curd-linux-x86_64
            release/linux/curd-linux-arm64
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
